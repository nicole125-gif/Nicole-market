<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>后台管理 · Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#010612;--bg2:#060d20;--bg3:#0a1530;
  --red:#E30613;--cyan:#22d3ee;--green:#00FFB2;--gold:#FFD700;--purple:#BF80FF;--orange:#FF6B35;
  --text:#fff;--text2:rgba(255,255,255,.55);--text3:rgba(255,255,255,.25);
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --font-mono:'IBM Plex Mono',monospace;--font-display:'Syne',sans-serif;
}
html{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--font-display);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

/* ── LOCK SCREEN ─────────────────────────────── */
#lock{
  position:fixed;inset:0;z-index:9999;
  background:radial-gradient(ellipse at 30% 40%, rgba(227,6,19,.08) 0%, transparent 60%),
             radial-gradient(ellipse at 80% 70%, rgba(34,211,238,.05) 0%, transparent 50%),
             #010612;
  display:flex;align-items:center;justify-content:center;
}
.lock-box{
  width:380px;padding:48px 40px;
  background:rgba(6,13,32,.9);
  border:1px solid var(--border2);
  position:relative;overflow:hidden;
}
.lock-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--red),var(--cyan));background-size:200% 100%;animation:flow 3s ease infinite}
.lock-logo{font-family:var(--font-mono);font-size:11px;letter-spacing:.3em;color:var(--text3);margin-bottom:32px}
.lock-logo span{color:var(--red)}
.lock-title{font-size:22px;font-weight:800;letter-spacing:-.02em;margin-bottom:6px}
.lock-sub{font-family:var(--font-mono);font-size:9px;color:var(--text3);letter-spacing:.2em;margin-bottom:32px}
.lock-field{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);padding:12px 16px;color:var(--text);font-family:var(--font-mono);font-size:13px;letter-spacing:.1em;outline:none;transition:border-color .2s;margin-bottom:12px}
.lock-field:focus{border-color:var(--cyan)}
.lock-field.shake{animation:shake .4s ease}
.lock-btn{width:100%;padding:13px;background:var(--red);border:none;color:#fff;font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:.2em;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.lock-btn:hover{background:#ff1a1a;box-shadow:0 0 30px rgba(227,6,19,.4)}
.lock-err{font-family:var(--font-mono);font-size:9px;color:var(--red);letter-spacing:.1em;margin-top:10px;height:14px;transition:opacity .2s}

/* ── MAIN LAYOUT ────────────────────────────── */
#app{display:none;min-height:100vh}

/* TOP BAR */
.topbar{
  position:sticky;top:0;z-index:100;
  background:rgba(1,6,18,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:16px;padding:0 32px;height:56px;
}
.topbar-brand{font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:.25em;color:var(--text)}
.topbar-brand span{color:var(--red)}
.topbar-badge{font-family:var(--font-mono);font-size:8px;padding:2px 8px;background:rgba(0,255,178,.08);border:1px solid rgba(0,255,178,.2);color:var(--green);letter-spacing:.15em}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.save-btn{
  display:flex;align-items:center;gap:8px;
  padding:8px 20px;background:var(--red);border:none;color:#fff;
  font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:.15em;
  cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
}
.save-btn:hover{background:#ff1a1a;box-shadow:0 0 20px rgba(227,6,19,.35)}
.save-btn.saved{background:rgba(0,255,178,.15);border:1px solid var(--green);color:var(--green)}
.preview-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;background:transparent;border:1px solid var(--border2);color:var(--text2);font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;cursor:pointer;transition:all .2s;text-decoration:none}
.preview-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.logout-btn{background:none;border:none;color:var(--text3);font-family:var(--font-mono);font-size:9px;letter-spacing:.15em;cursor:pointer;padding:6px 10px;transition:color .2s}
.logout-btn:hover{color:var(--red)}

/* SIDEBAR */
.layout{display:flex;min-height:calc(100vh - 56px)}
.sidebar{
  width:220px;flex-shrink:0;
  background:rgba(4,9,24,.6);border-right:1px solid var(--border);
  padding:24px 0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;
}
.sidebar-section{padding:0 16px;margin-bottom:24px}
.sidebar-label{font-family:var(--font-mono);font-size:8px;color:var(--text3);letter-spacing:.25em;margin-bottom:10px;padding:0 8px}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;cursor:pointer;
  font-size:12px;color:var(--text2);letter-spacing:.03em;
  border-left:2px solid transparent;transition:all .18s;border-radius:0 4px 4px 0;
  margin-bottom:2px;
}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,.04)}
.nav-item.active{color:var(--text);border-left-color:var(--red);background:rgba(227,6,19,.06)}
.nav-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.meta-info{padding:16px;margin:16px;background:rgba(255,255,255,.03);border:1px solid var(--border)}
.meta-row{display:flex;justify-content:space-between;margin-bottom:6px;font-family:var(--font-mono);font-size:8.5px}
.meta-key{color:var(--text3);letter-spacing:.1em}
.meta-val{color:var(--text2)}

/* MAIN CONTENT */
.main{flex:1;padding:32px;overflow-y:auto;max-width:1000px}

/* SECTION HEADER */
.section-header{margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.section-title{font-size:24px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px}
.section-sub{font-family:var(--font-mono);font-size:9px;color:var(--text3);letter-spacing:.2em}
.section-badge{display:inline-block;padding:3px 10px;font-family:var(--font-mono);font-size:8px;letter-spacing:.15em;margin-bottom:12px;border:1px solid;border-radius:0}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);padding:24px;margin-bottom:16px;position:relative}
.card-title{font-family:var(--font-mono);font-size:9px;color:var(--text3);letter-spacing:.2em;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* FORM ELEMENTS */
.field-group{margin-bottom:18px}
.field-label{font-family:var(--font-mono);font-size:8.5px;color:var(--text3);letter-spacing:.15em;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.field-label .tag{padding:1px 6px;background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.2);color:var(--cyan);font-size:7.5px}
input[type=text],input[type=number],textarea,select{
  width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);
  color:var(--text);font-family:var(--font-mono);font-size:12px;
  padding:10px 14px;outline:none;transition:border-color .2s;resize:vertical;
}
input[type=text]:focus,input[type=number]:focus,textarea:focus,select:focus{border-color:var(--cyan)}
input[type=range]{width:100%;accent-color:var(--cyan);margin-top:4px}
.range-val{font-family:var(--font-mono);font-size:10px;color:var(--cyan);margin-left:8px}

/* GRID */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
@media(max-width:700px){.grid-2,.grid-3{grid-template-columns:1fr}}

/* LIST ITEMS (editable) */
.list-item{
  background:rgba(255,255,255,.025);border:1px solid var(--border);
  padding:16px;margin-bottom:10px;position:relative;
  transition:border-color .2s;
}
.list-item:hover{border-color:var(--border2)}
.list-item-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.item-num{font-family:var(--font-mono);font-size:9px;color:var(--text3);letter-spacing:.1em;width:24px}
.urgency-badge{padding:2px 8px;font-family:var(--font-mono);font-size:8px;letter-spacing:.1em;border:1px solid;cursor:pointer}
.urgency-badge.HIGH{color:#FF6B35;border-color:rgba(255,107,53,.4);background:rgba(255,107,53,.08)}
.urgency-badge.MED{color:#FFD700;border-color:rgba(255,215,0,.4);background:rgba(255,215,0,.08)}
.urgency-badge.LOW{color:#00FFB2;border-color:rgba(0,255,178,.4);background:rgba(0,255,178,.08)}

/* COLOR PICKER ROW */
.color-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.color-chip{width:24px;height:24px;border:2px solid transparent;cursor:pointer;transition:transform .15s;border-radius:2px}
.color-chip:hover{transform:scale(1.15)}
.color-chip.selected{border-color:#fff;transform:scale(1.1)}

/* SPARKLINE PREVIEW */
.spark-preview{display:flex;align-items:flex-end;gap:4px;height:32px;margin-top:8px}
.spark-bar{background:var(--cyan);opacity:.6;border-radius:1px;min-width:8px;transition:height .3s}

/* TABS */
.tabs{display:flex;gap:0;margin-bottom:24px;border-bottom:1px solid var(--border)}
.tab{padding:10px 20px;font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .18s}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--text);border-bottom-color:var(--red)}

/* STATUS */
.status-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(1,6,18,.95);border-top:1px solid var(--border);
  padding:8px 32px;display:flex;align-items:center;gap:16px;z-index:50;
}
.status-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 2s infinite}
.status-txt{font-family:var(--font-mono);font-size:8.5px;color:var(--text3);letter-spacing:.15em}
.status-time{margin-left:auto;font-family:var(--font-mono);font-size:8.5px;color:var(--text3);letter-spacing:.1em}

/* PUBLISH PANEL */
.publish-panel{background:rgba(0,255,178,.05);border:1px solid rgba(0,255,178,.15);padding:20px;margin-bottom:24px}
.publish-title{font-size:13px;font-weight:700;color:var(--green);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.publish-sub{font-family:var(--font-mono);font-size:9px;color:rgba(0,255,178,.5);letter-spacing:.1em}

/* ANIMATIONS */
@keyframes flow{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease both}

/* TOAST */
.toast{
  position:fixed;top:72px;right:24px;z-index:9999;
  background:rgba(0,255,178,.12);border:1px solid var(--green);
  padding:12px 20px;font-family:var(--font-mono);font-size:10px;color:var(--green);
  letter-spacing:.12em;transform:translateX(120%);transition:transform .3s cubic-bezier(.16,1,.3,1);
}
.toast.show{transform:translateX(0)}
</style>
</head>

      <div class="meta-info">
        <div class="meta-row"><span class="meta-key">最后更新</span><span class="meta-val" id="meta-date">—</span></div>
        <div class="meta-row"><span class="meta-key">更新人</span><span class="meta-val" id="meta-author">—</span></div>
        <div class="meta-row"><span class="meta-key">版本</span><span class="meta-val" id="meta-ver">—</span></div>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main" id="main-content"></div>
  </div>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <span class="status-dot"></span>
    <span class="status-txt">系统在线 · 所有更改实时保存到本地</span>

  </div>
</div>

// Loads saved edits from localStorage, merges over defaults
(function() {
  try {
    const saved = localStorage.getItem('burkert_data');
    if (saved) {
      const parsed = JSON.parse(saved);
      // Deep merge saved data over defaults
      function deepMerge(target, source) {
        for (const key of Object.keys(source)) {
          if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key])) {
            if (!target[key]) target[key] = {};
            deepMerge(target[key], source[key]);
          } else {
            target[key] = source[key];
          }
        }
        return target;
      }
      deepMerge(window.BURKERT_DATA, parsed);
    }
  } catch(e) {
    console.warn('Could not load saved data:', e);
  }
})();

/* ══ AUTH ══════════════════════════════════════════════ */
const PASSWORDS = ['burkert2026', 'nicole888', 'admin2026'];  // 可在设置页修改

function tryLogin() {
  const val = document.getElementById('pw-input').value;
  const stored = localStorage.getItem('burkert_passwords');
  const validPws = stored ? JSON.parse(stored) : PASSWORDS;
  if (validPws.includes(val)) {
    localStorage.setItem('burkert_session', Date.now());
    document.getElementById('lock').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  } else {
    const el = document.getElementById('pw-input');
    el.classList.add('shake');
    document.getElementById('lock-err').textContent = '密码错误，请重试';
    setTimeout(()=>el.classList.remove('shake'), 400);
    document.getElementById('pw-input').value = '';
  }
}
document.getElementById('pw-input').addEventListener('keydown', e=>{ if(e.key==='Enter') tryLogin(); });

// Check existing session (8h)
document.addEventListener('DOMContentLoaded', function() {
  if (localStorage.getItem('burkert_session') && Date.now() - parseInt(localStorage.getItem('burkert_session')) < 28800000) {
    document.getElementById('lock').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  }
});

function logout() {
  localStorage.removeItem('burkert_session');

function initApp() {

function updateClock() {

/* ══ NAVIGATION ════════════════════════════════════════ */
function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));

/* ══ COLOR PALETTE ═════════════════════════════════════ */
const COLORS = ['#00FFB2','#00C8FF','#FFD700','#FF6B35','#BF80FF','#E30613','#22d3ee','#fff'];

function colorPicker(current, onChange) {
  const row = document.createElement('div');
  row.className = 'color-row';
  COLORS.forEach(c => {
    const chip = document.createElement('div');
    chip.className = 'color-chip' + (c===current?' selected':'');
    chip.style.background = c;
    chip.title = c;
    chip.onclick = () => {
      row.querySelectorAll('.color-chip').forEach(ch=>ch.classList.remove('selected'));
      chip.classList.add('selected');
      onChange(c);
    };
    row.appendChild(chip);
  });
  return row;
}

function field(label, value, onChange, tag='', type='text') {
  const g = document.createElement('div');
  g.className = 'field-group';
  g.innerHTML = `<div class="field-label">${label}${tag?`<span class="tag">${tag}</span>`:''}</div>`;
  const input = document.createElement(type==='textarea'?'textarea':'input');
  if(type!=='textarea') input.type = type;
  input.value = value;
  if(type==='textarea') input.rows = 3;
  input.style.cssText = type==='textarea'?'':'';
  input.addEventListener('input', ()=>onChange(input.value));
  g.appendChild(input);
  return g;
}

  rc.innerHTML='<div class="card-title">05 · 风险矩阵</div>';
  sm.risks.forEach((r,i) => {
    const li = document.createElement('div'); li.className='list-item';
    const urgencies = ['HIGH','MED','LOW'];
    let ui = urgencies.indexOf(r.level);
    const badge = document.createElement('span');
    badge.className=`urgency-badge ${r.level}`;
    badge.textContent=r.level;
    badge.onclick=()=>{ ui=(ui+1)%3; r.level=urgencies[ui]; badge.className=`urgency-badge ${r.level}`; badge.textContent=r.level; };
    li.innerHTML=`<div class="list-item-header"><span class="item-num">0${i+1}</span></div>`;
    li.querySelector('.list-item-header').appendChild(badge);
    const g = document.createElement('div'); g.className='grid-2';
    g.appendChild(field('风险名称', r.label, v=>r.label=v));
    g.appendChild(field('风险描述', r.desc, v=>r.desc=v, '', 'textarea'));
    li.appendChild(g);
    rc.appendChild(li);
  });
  main.appendChild(rc);
}

/* ══ SETTINGS PAGE ═════════════════════════════════════ */
function renderSettings() {
  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="section-header">
      <div class="section-title">系统设置</div>
      <div class="section-sub">SYSTEM CONFIGURATION</div>
    </div>

    <div class="card">
      <div class="card-title">01 · 密码管理</div>
      <div class="field-group">
        <div class="field-label">当前密码列表（每行一个）</div>
        <textarea id="pw-list" rows="4" style="width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);color:#fff;font-family:'IBM Plex Mono',monospace;font-size:12px;padding:10px 14px;outline:none;resize:vertical"></textarea>
      </div>
      <button onclick="savePw()" style="padding:10px 20px;background:var(--red);border:none;color:#fff;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.15em;cursor:pointer">保存密码</button>
    </div>

    <div class="card">
      <div class="card-title">02 · 作者信息</div>
      <div class="grid-2">
        <div class="field-group">
          <div class="field-label">更新人姓名</div>
          <input type="text" id="author-name" value="${D.meta.updatedBy}" style="width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);color:#fff;font-family:'IBM Plex Mono',monospace;font-size:12px;padding:10px 14px;outline:none"/>
        </div>
        <div class="field-group">
          <div class="field-label">版本号</div>
          <input type="text" id="ver-num" value="${D.meta.version}" style="width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);color:#fff;font-family:'IBM Plex Mono',monospace;font-size:12px;padding:10px 14px;outline:none"/>
        </div>
      </div>
      <button onclick="saveMeta()" style="padding:10px 20px;background:rgba(0,255,178,.1);border:1px solid rgba(0,255,178,.3);color:var(--green);font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.15em;cursor:pointer;margin-top:8px">保存信息</button>
    </div>

    <div class="card" style="border-color:rgba(255,107,53,.2)">
      <div class="card-title">03 · 危险操作</div>
      <button onclick="resetAll()" style="padding:10px 20px;background:transparent;border:1px solid rgba(255,107,53,.4);color:#FF6B35;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.15em;cursor:pointer">⚠ 重置所有内容到默认值</button>
      <p style="font-family:'IBM Plex Mono',monospace;font-size:8.5px;color:rgba(255,255,255,.2);margin-top:10px;letter-spacing:.08em">此操作不可撤销，将清除所有已保存的编辑内容</p>
    </div>
  `;

  // Load current passwords
  const stored = localStorage.getItem('burkert_passwords');
  const pws = stored ? JSON.parse(stored) : PASSWORDS;
  document.getElementById('pw-list').value = pws.join('\n');
}

function savePw() {
  const pws = document.getElementById('pw-list').value.split('\n').map(p=>p.trim()).filter(Boolean);
  localStorage.setItem('burkert_passwords', JSON.stringify(pws));
  showToast('✓ 密码已更新');
}

function saveMeta() {
  D.meta.updatedBy = document.getElementById('author-name').value;
  D.meta.version = document.getElementById('ver-num').value;
  saveAll();
}

function resetAll() {
  if(confirm('确定要重置所有内容吗？此操作不可撤销。')) {
    localStorage.removeItem('burkert_data');
    showToast('⚠ 已重置，请刷新页面');
    setTimeout(()=>location.reload(), 1500);
  }
}
</script>
</body>
</html>
