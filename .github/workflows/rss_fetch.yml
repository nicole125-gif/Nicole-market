name: PULSE 2026 — RSS Daily Fetch

on:
  # 每天北京时间 08:00 运行（UTC 00:00）
  schedule:
    - cron: "0 0 * * *"
  # 允许手动触发（GitHub Actions 页面点 Run workflow）
  workflow_dispatch:
    inputs:
      target_vertical:
        description: "只抓取指定垂直（留空=全部）: macro / semiconductor / ai_liquid_cooling / hydrogen / pharma_equipment / food_beverage / mass_spec"
        required: false
        default: ""

permissions:
  contents: write   # 允许 workflow 推送生成的 JSON 文件

jobs:
  fetch-rss:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. Checkout 代码
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. 安装 Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. 安装依赖
      - name: Install dependencies
        run: |
          pip install feedparser requests python-dateutil

      # 4. 运行抓取脚本
      - name: Fetch RSS feeds
        env:
          RSS_TARGET_VERTICAL: ${{ github.event.inputs.target_vertical }}
        run: |
          python fetch_rss.py

      # 5. 提交生成的 JSON 文件
      - name: Commit & push data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rss/
          # 如果没有变化就跳过 commit（避免空提交报错）
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "chore: RSS update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
