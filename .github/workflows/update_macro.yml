name: 宏观Dashboard自动更新

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout仓库
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install akshare

      - name: 运行更新脚本
        run: python scripts/update_macro.py

      - name: Commit并Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet && echo "无变化，跳过" || git commit -m "auto: 宏观数据更新 $(date +%Y-%m-%d)"
          git push || echo "nothing to push"
