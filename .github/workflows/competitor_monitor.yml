name: 竞品产品监控

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  scrape-and-analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests beautifulsoup4 lxml

      - name: 抓取产品数据
        run: python scrape_products.py

      - name: Claude 分析（SimpleAI）
        env:
          CLAUDE_API_KEY:  ${{ secrets.CLAUDE_API_KEY }}
          CLAUDE_BASE_URL: https://key.simpleai.com.cn
        run: python analyze_products.py

      - name: Commit 结果
        run: |
          git config user.name "competitor-bot"
          git config user.email "bot@intel.local"
          git add data/
          git diff --staged --quiet || git commit -m "竞品更新: $(date +'%Y-%m-%d')"
          git push
