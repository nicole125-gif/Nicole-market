name: Weekly News Update

on:
  schedule:
    - cron: '0 1 * * 1'  # 每周一 UTC 01:00（北京时间早上9点）
  workflow_dispatch:      # 允许手动触发（方便测试）

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests anthropic feedparser beautifulsoup4

      - name: Run update script
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: python scripts/update_news.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pharma.html data.js
          git diff --staged --quiet || git commit -m "chore: auto update pharma news $(date +'%Y-%m-%d')"
          git push
