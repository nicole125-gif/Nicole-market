name: Monthly Intelligence Update

on:
  schedule:
    - cron: '0 2 1 * *'   # 每月1日 UTC 02:00（北京时间早上10点）
  workflow_dispatch:        # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run update script
        env:
         CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
         BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
        run: python scripts/update_news.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html pharma.html data/history.json
          git diff --staged --quiet || git commit -m "chore: auto update PULSE $(date +'%Y-%m')"
          git push
