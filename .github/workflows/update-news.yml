name: Monthly Intelligence Update
on:
  schedule:
    - cron: '0 2 1 * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic chromadb sentence-transformers pypdf langchain-community langchain-text-splitters rank-bm25 jieba

      - name: Build RAG vector database
        run: |
          python - <<'EOF'
          from pathlib import Path
          import hashlib, json

          REPORTS_DIR = Path("reports")
          DB_DIR = "pulse_vectordb"
          HASH_FILE = Path("data/reports_hash.json")

          # 计算当前所有PDF的哈希
          current_hash = {}
          for p in sorted(REPORTS_DIR.glob("*.pdf")):
              current_hash[p.name] = hashlib.md5(p.read_bytes()).hexdigest()

          # 读取上次的哈希
          prev_hash = {}
          if HASH_FILE.exists():
              prev_hash = json.loads(HASH_FILE.read_text())

          # 没有变化就跳过
          if current_hash == prev_hash:
              print("PDF未变化，跳过向量库重建")
              exit()

          print("PDF有变化，重建向量库...")

          from langchain_community.document_loaders import PyPDFLoader
          from langchain_text_splitters import RecursiveCharacterTextSplitter
          from sentence_transformers import SentenceTransformer
          import chromadb

          all_docs = []
          for p in sorted(REPORTS_DIR.glob("*.pdf")):
              try:
                  loader = PyPDFLoader(str(p))
                  docs = loader.load()
                  for d in docs:
                      d.metadata["company"] = p.stem
                  all_docs.extend(docs)
                  print(f"Loaded: {p.name}")
              except Exception as e:
                  print(f"Skip {p.name}: {e}")

          chunks = RecursiveCharacterTextSplitter(
              chunk_size=600, chunk_overlap=100
          ).split_documents(all_docs)
          print(f"Chunks: {len(chunks)}")

          embedder = SentenceTransformer("BAAI/bge-small-zh-v1.5")
          client = chromadb.PersistentClient(path=DB_DIR)
          if "reports" in [c.name for c in client.list_collections()]:
              client.delete_collection("reports")
          collection = client.create_collection("reports")

          batch_size = 50
          for i in range(0, len(chunks), batch_size):
              batch = chunks[i:i+batch_size]
              texts = [c.page_content for c in batch]
              metas = [c.metadata for c in batch]
              ids = [f"chunk_{i+j}" for j in range(len(batch))]
              vectors = embedder.encode(texts, show_progress_bar=False).tolist()
              collection.add(ids=ids, embeddings=vectors, documents=texts, metadatas=metas)

          print(f"RAG DB ready: {collection.count()} chunks")

          # 保存新哈希
          import os
          os.makedirs("data", exist_ok=True)
          HASH_FILE.write_text(json.dumps(current_hash, ensure_ascii=False))
          print("哈希已保存")
          EOF

      - name: Run update script
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
        run: python scripts/update_news.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html pharma.html data/history.json data/reports_hash.json
          git diff --staged --quiet || git commit -m "chore: auto update PULSE $(date +'%Y-%m')"
          git pull --rebase origin main
          git push
